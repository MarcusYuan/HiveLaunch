name: API CI macOS

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'infra/tauri/**'
      - 'packages/bee-*/**'
      - '.github/workflows/api-ci-macos.yml'
  push:
    branches: [dev, main]
    paths:
      - 'infra/tauri/**'
      - 'packages/bee-*/**'
      - '.github/workflows/api-ci-macos.yml'
  workflow_dispatch:

concurrency:
  group: api-ci-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --manifest-path infra/tauri/Cargo.toml
      - run: cargo test --manifest-path infra/tauri/Cargo.toml
      - run: cargo build --manifest-path infra/tauri/Cargo.toml --bin http-server
