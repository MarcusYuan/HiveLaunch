name: API CI Linux

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'infra/tauri/**'
      - 'packages/bee-*/**'
      - '.github/workflows/api-ci-linux.yml'
  push:
    branches: [dev, main]
    paths:
      - 'infra/tauri/**'
      - 'packages/bee-*/**'
      - '.github/workflows/api-ci-linux.yml'
  workflow_dispatch:

concurrency:
  group: api-ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-quality-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: cargo check --manifest-path infra/tauri/Cargo.toml
      - run: cargo test --manifest-path infra/tauri/Cargo.toml
      - run: cargo build --manifest-path infra/tauri/Cargo.toml --bin http-server
