name: Desktop CI Linux

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'infra/tauri/**'
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'packages/shared-ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/desktop-ci-linux.yml'
  push:
    branches: [dev, main]
    paths:
      - 'infra/tauri/**'
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'packages/shared-ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/desktop-ci-linux.yml'
  workflow_dispatch:

concurrency:
  group: desktop-ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-smoke-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --debug --config infra/tauri/tauri.conf.json
