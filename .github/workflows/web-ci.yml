name: Web CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'apps/web/**'
      - 'features/**'
      - 'packages/shared-types/**'
      - 'packages/shared-ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/web-ci.yml'
  push:
    branches: [dev, main]
    paths:
      - 'apps/web/**'
      - 'features/**'
      - 'packages/shared-types/**'
      - 'packages/shared-ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @hivelaunch/web test:run
      - run: pnpm --filter @hivelaunch/web build
